<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NMDL Expert Chat</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#0f172a;
      --muted:#94a3b8;
      --text:#e2e8f0;
      --border:rgba(148,163,184,.16);
      --user:#1d4ed8;
      --assistantBubble:#0b1020;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 14px;
      margin: 0;
      letter-spacing: .3px;
    }

    header button {
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
    }

    header button:hover {
      background: rgba(226,232,240,.06);
    }

    #chatBox {
      height: 70vh;
      overflow-y: auto;
      padding: 18px;
      background: rgba(2,6,23,.35);
    }

    .msg {
      margin: 10px 0;
      display: flex;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }

    .msg.user .bubble {
      background: rgba(29,78,216,.18);
      border-color: rgba(29,78,216,.35);
    }

    .msg.assistant .bubble {
      background: var(--assistantBubble);
    }

    .inputRow {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--border);
      background: rgba(15,23,42,.7);
      align-items: flex-end;
    }

    #messageInput {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text);
      background: rgba(2,6,23,.35);
      outline: none;
      resize: vertical;
      min-height: 44px;
      max-height: 200px;
      line-height: 1.35;
    }

    #messageInput::placeholder {
      color: rgba(148,163,184,.75);
    }

    #sendBtn {
      padding: 10px 14px;
      border: 1px solid rgba(29,78,216,.45);
      border-radius: 12px;
      cursor: pointer;
      background: rgba(29,78,216,.22);
      color: var(--text);
    }

    #sendBtn:hover {
      background: rgba(29,78,216,.32);
    }

    #sendBtn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <header>
        <h1>NMDL Expert – Ministral-3B</h1>
        <button id="clearBtn" type="button">clear chat</button>
      </header>

      <div id="chatBox"></div>

      <div class="inputRow">
        <textarea id="messageInput" placeholder="Frage zu NMDL stellen…" rows="2"></textarea>
        <button id="sendBtn" type="button">Senden</button>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ===== Chat-Verlauf NUR im Frontend =====
    let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");

    function renderHistory() {
      chatBox.innerHTML = "";
      for (const m of chatHistory) addMessage(m.role, m.text);
    }
    renderHistory();
    // ===== Beim Seitenladen: Server- und Frontend-Chat automatisch resetten =====
(async () => {
  try {
    await fetch("/reset", { method: "POST" });
  } catch (e) {
    // wenn Server noch nicht da ist, ignorieren
  }
  chatHistory = [];
  localStorage.removeItem("chatHistory");
  renderHistory();
})();

    clearBtn.addEventListener("click", async () => {
      await fetch("/reset", { method: "POST" });
      chatHistory = [];
      localStorage.removeItem("chatHistory");
      renderHistory();
    });

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg) return;

      input.value = "";
      sendBtn.disabled = true;

      addMessage("user", msg);
      chatHistory.push({ role: "user", text: msg });
      localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });

        if (!res.ok) {
          const err = await res.text();
          addMessage("assistant", `Fehler: ${err || res.status}`);
          return;
        }

        const data = await res.json();
        const answer = (data.answer || "").trim();

        addMessage("assistant", answer);
        chatHistory.push({ role: "assistant", text: answer });
        localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

      } catch (e) {
        addMessage("assistant", "Fehler: Server nicht erreichbar.");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
